<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ site_description }}{% endblock %}">
    <meta name="keywords" content="{% block keywords %}{{ site_keywords }}{% endblock %}">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:site_name" content="{{ site_name }}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:title" content="{% block og_title %}{{ site_name }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ site_description }}{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ site_url }}{% endblock %}">
    {% block og_image %}{% endblock %}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}{{ site_name }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{{ site_description }}{% endblock %}">
    {% block twitter_image %}{% endblock %}

    <!-- Canonical URL -->
    <link rel="canonical" href="{% block canonical_url %}{{ site_url }}{% endblock %}">

    <!-- Schema.org 结构化数据 -->
    {% block schema %}{% endblock %}

    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">

    {% if analytics_id %}
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ analytics_id }}"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ analytics_id }}');
    </script>
    {% endif %}

    {% if cloudflare_analytics_token %}
    <!-- Cloudflare Web Analytics -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "{{ cloudflare_analytics_token }}"}'></script>
    {% endif %}
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">{{ site_name }}</a>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/sitemap.xml">站点地图</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; {{ site_name }}. 内容来自网络，仅供学习交流。</p>
        </div>
    </footer>
</body>
</html>
